<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neo Dash</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">
<h1>NEO DASH</h1>
<button onclick="startGame()">PLAY</button>
<button onclick="openShop()">SHOP</button>
<button onclick="watchAd()">WATCH AD (+5)</button>
<p>Coins: <span id="coins">0</span></p>
<p>High Score: <span id="highscore">0</span></p>
</div>

<canvas id="game" width="900" height="400"></canvas>

<div id="shop">
<h2>SHOP</h2>
<button onclick="buySkin('white',0)">Default</button>
<button onclick="buySkin('cyan',50)">Cyan</button>
<button onclick="buySkin('yellow',100)">Gold</button>
<button onclick="buySkin('lime',150)">Lime</button>
<button onclick="buySkin('purple',200)">Neon</button>
<button onclick="buySkin('orange',300)">Fire</button>
<br><br>
<button onclick="closeShop()">Close</button>
</div>

<audio id="jumpSound">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script src="game.js"></script>
</body>
</html>
